<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Contato - TerraFertil</title>

    <link rel="icon" href="/assets/IMG/terrafertil2.ico">

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

    <!-- TOPO -->
    <div class="topo">
        <span>TerraFertil - Contatação</span>
    </div>

    <!-- LOGO -->
    <div class="logo-titulo">

        <img src="/assets/IMG/logo-terrafertil.png" width="225" height="125">

        <div class="logo">
            <h1>TerraFertil</h1>
        </div>

    </div>

    <!-- MENU -->
    <div class="menu">
        <a href="index.html">← Início</a>
    </div>

    <!-- BANNER -->
    <div class="banner">

        <h2>Entre em Contato 📩</h2>

        <p>
            Envie sua mensagem para o TerraFertil
        </p>

    </div>

    <!-- CONTEÚDO -->
    <div class="conteudo">

        <div class="caixa-contato">

            <form>

                <label>Nome</label>
                <input type="text" placeholder="Digite seu nome">

                <label>Email</label>
                <input type="email" placeholder="Digite seu email">

                <label>Mensagem</label>
                <textarea placeholder="Digite sua mensagem"></textarea>

                <button type="submit">Enviar Mensagem</button>

            </form>

        </div>

    </div>

    <!-- RODAPÉ -->
    <footer class="rodape">

        <p>
            © 2026 TerraFertil - Todos os direitos reservados
        </p>

    </footer>

</body>
</html>
